name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"        # 👈 ensures tag pushes trigger workflow
  pull_request:
    branches: [main]
  workflow_dispatch:   # 👈 manual trigger
  release:
    types: [created]   # 👈 trigger on GitHub release

jobs:
  # ── Job 1: Lint + Unit tests (Ubuntu, headless) ─────────────────────────────
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pillow openpyxl
          pip install pytest pytest-cov ruff

      - name: Lint with ruff
        run: ruff check . --select=F,E9 --exclude=generate_assets.py

      - name: Run unit tests
        run: |
          # Set up virtual display for tkinter on Ubuntu
          sudo apt-get update
          sudo apt-get install -y xvfb python3-tk
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 1
          pytest tests/ -v --tb=short

  # ── Job 2: Build .exe (Windows) ─────────────────────────────────────────────
  build-exe:
    runs-on: windows-latest
    needs: lint-and-test

    # 👇 run on tag OR manual OR release
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'release'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pillow openpyxl pyinstaller

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            $ver = "${{ github.event.release.tag_name }}".TrimStart("v")
          }
          elseif ("${{ github.ref }}" -like "refs/tags/v*") {
            $ver = "${{ github.ref_name }}".TrimStart("v")
          }
          else {
            $ver = "dev-${{ github.run_number }}"
          }

          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "Using version: $ver"

      - name: Patch version into updater.py
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          (Get-Content updater.py) -replace 'CURRENT_VERSION = ".*"', "CURRENT_VERSION = `"$ver`"" | Set-Content updater.py
          echo "Patched CURRENT_VERSION to $ver"

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller DesktopCatCompanion.spec

      - name: Upload .exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopCatCompanion-${{ steps.version.outputs.VERSION }}
          path: dist/DesktopCatCompanion/
          retention-days: 30
